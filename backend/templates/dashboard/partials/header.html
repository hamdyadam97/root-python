{% load i18n %}
<header class="admin-header h-16 border-b px-4 lg:px-8 flex items-center justify-between sticky top-0 z-30">
  <div class="flex items-center gap-4">
    <button @click="mobileOpen = true" class="lg:hidden text-slate-500 hover:text-slate-700 dark:text-slate-300">
      <i class="fa-solid fa-bars text-xl"></i>
    </button>
    <h1 class="text-lg lg:text-xl font-bold text-slate-800 dark:text-slate-100 truncate">
      {% block page_title %}{% trans "Dashboard" %}{% endblock %}
    </h1>
  </div>

  <div class="flex items-center gap-3 lg:gap-5">
    <!-- Global search -->
    <form action="{% url 'dashboard:index' %}" method="get" class="hidden md:flex items-center relative">
      <i class="fa-solid fa-magnifying-glass absolute ms-3 text-slate-400"></i>
      <input type="search" name="q" placeholder="{% trans 'Search...' %}"
             class="admin-input bg-slate-100 dark:bg-slate-800 border border-transparent rounded-lg ps-10 pe-4 py-2 text-sm w-64 transition">
    </form>

    <!-- Theme toggle -->
    <button @click="toggleTheme()" class="w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700">
      <i class="fa-solid" :class="theme === 'dark' ? 'fa-sun' : 'fa-moon'"></i>
    </button>

    <!-- Language switch -->
    <form action="{% url 'set_language' %}" method="post" class="hidden sm:block">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      <select name="language" onchange="this.form.submit()"
              class="admin-input bg-slate-100 dark:bg-slate-800 border border-transparent rounded-lg px-2 py-1.5 text-sm cursor-pointer">
        <option value="ar" {% if LANGUAGE_CODE == 'ar' %}selected{% endif %}>العربية</option>
        <option value="en" {% if LANGUAGE_CODE == 'en' %}selected{% endif %}>English</option>
      </select>
    </form>

    <!-- Notifications -->
    <button class="relative w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700">
      <i class="fa-regular fa-bell"></i>
      <span class="absolute top-1.5 end-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <!-- User menu -->
    <div class="relative" x-data="{ open: false }" @click.away="open = false">
      <button @click="open = !open" class="flex items-center gap-2 focus:outline-none">
        <div class="w-9 h-9 rounded-full bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300 flex items-center justify-center font-bold text-sm">
          {{ request.user.first_name|first|default:request.user.email|first|default:"A" }}
        </div>
        <span class="hidden lg:block text-sm font-medium text-slate-700 dark:text-slate-200">{{ request.user.full_name|default:request.user.email|default:request.user.phone }}</span>
        <i class="fa-solid fa-chevron-down text-xs text-slate-400 hidden lg:block"></i>
      </button>
      <div x-show="open" x-transition class="absolute {% if LANGUAGE_CODE == 'ar' %}left-0{% else %}right-0{% endif %} mt-2 w-48 admin-card rounded-xl shadow-lg border py-1 z-50">
        <a href="{% url 'dashboard:update' section='users' pk=request.user.pk %}" class="block px-4 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-700">
          <i class="fa-regular fa-user me-2"></i>{% trans "Profile" %}
        </a>
        <a href="{% url 'dashboard:list' section='settings' %}" class="block px-4 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-700">
          <i class="fa-solid fa-sliders me-2"></i>{% trans "Settings" %}
        </a>
        <div class="border-t border-slate-200 dark:border-slate-700 my-1"></div>
        <a href="/system-admin/logout/" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20">
          <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>{% trans "Logout" %}
        </a>
      </div>
    </div>
  </div>
</header>
