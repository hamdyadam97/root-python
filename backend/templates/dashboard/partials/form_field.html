{% load i18n %}
<div class="{% if wide %}md:col-span-2{% endif %}">
  <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2">
    {{ field.label }}
  </label>
  {{ field }}
  {% if field.help_text %}
    <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">{{ field.help_text }}</p>
  {% endif %}
  {% if field.errors %}
    <div class="mt-2 flex items-start gap-2 text-xs text-rose-600">
      <i class="fa-solid fa-circle-exclamation mt-1"></i>
      <span>{{ field.errors }}</span>
    </div>
  {% endif %}
</div>
