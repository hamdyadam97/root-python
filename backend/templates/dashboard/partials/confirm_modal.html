{% load i18n %}
<div x-data="{ open: false, title: '', message: '', action: '', form: null }"
     @confirm.window="open = true; title = $event.detail.title; message = $event.detail.message; action = $event.detail.action; form = $event.detail.form || null;"
     x-show="open"
     x-transition.opacity
     class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 p-4"
     style="display: none;">
  <div @click.away="open = false" class="admin-card w-full max-w-md rounded-2xl shadow-2xl p-6">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 flex items-center justify-center">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h3 x-text="title" class="text-lg font-bold text-slate-800 dark:text-slate-100"></h3>
    </div>
    <p x-text="message" class="text-slate-600 dark:text-slate-300 mb-6"></p>
    <div class="flex justify-end gap-3">
      <button @click="open = false" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
        {% trans "Cancel" %}
      </button>
      <button @click="if(form) form.submit(); open = false"
              class="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-700 text-white">
        {% trans "Confirm" %}
      </button>
    </div>
  </div>
</div>
