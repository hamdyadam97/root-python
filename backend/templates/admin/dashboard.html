{% extends "admin/index.html" %}
{% load i18n admin_extras %}

{% block content %}
<style>
  .dashboard-stats {
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--body-bg);
    border-radius: 0.5rem;
  }
  .dashboard-stats h2 {
    margin-top: 0;
    margin-bottom: 1rem;
    font-size: 1.25rem;
    color: var(--body-fg);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }
  .stat-card {
    background: var(--darkened-bg);
    border: 1px solid var(--hairline-color);
    border-radius: 0.5rem;
    padding: 1rem;
    text-align: center;
  }
  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--primary);
  }
  .stat-label {
    margin-top: 0.25rem;
    font-size: 0.875rem;
    color: var(--body-quiet-color);
    text-transform: capitalize;
  }
</style>

<div class="dashboard-stats">
  <h2>{% translate "Platform Overview" %}</h2>
  <div class="stats-grid">
    {% for label, value in stats.items %}
      <div class="stat-card">
        <div class="stat-value">{{ value }}</div>
        <div class="stat-label">{{ label|underscore_to_space }}</div>
      </div>
    {% endfor %}
  </div>
</div>

{{ block.super }}
{% endblock %}
